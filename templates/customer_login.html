<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập khách hàng | BrewPoint</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/customer.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
<div class="container">
    <!-- LEFT -->
    <div class="left">
        <div class="overlay"></div>
        <div class="left-content">
            <div class="logo">
                <div class="logo-box">
                    <img src="{{ url_for('static', filename='images/logo.svg') }}" class="logo-img">
                </div>
                <span>BrewPoint</span>
            </div>
            <img src="{{ url_for('static', filename='images/coffee.svg') }}" class="banner">
            <div class="caption">
                <h1>
                    Chào mừng bạn<br>
                    quay trở lại!
                </h1>
                <p>
                    Đăng nhập để đặt món, tích điểm thành viên
                    và nhận nhiều ưu đãi hấp dẫn từ BrewPoint.
                </p>
            </div>
        </div>
    </div>
    <!-- RIGHT -->
    <div class="right">
        <div class="login-card">
            <h2>Đăng nhập</h2>
            <p class="sub-title">
                Rất vui được gặp lại bạn!
            </p>
            <form id="customerLogin">
                <div class="input-group">
                    <label>Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="example@gmail.com">
                </div>
                <div class="input-group">
                    <label>Mật khẩu</label>
                    <div class="password-box">
                        <input
                            type="password"
                            id="password"
                            placeholder="••••••••">
                        <i class='bx bx-hide toggle-password'></i>
                    </div>
                </div>
                <div class="option">
                    <label class="remember">
                        <input type="checkbox">
                        Ghi nhớ đăng nhập
                    </label>
                    <a href="#">Quên mật khẩu?</a>
                </div>
                <button class="login-btn">
                    Đăng nhập
                </button>
            </form>
            <div class="divider">
                <span>Hoặc</span>
            </div>
            <button class="google-btn">
                <i class='bx bxl-google'></i>
                Đăng nhập bằng Google
            </button>
            <p class="register">
                Chưa có tài khoản?
                <a href="{{ url_for('customer_register') }}">
                    Đăng ký ngay
                </a>
            </p>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='js/customer.js') }}"></script>
</body>
</html>
